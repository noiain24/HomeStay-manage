<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f5f2ed; color: #1a1a1a; }
    .serif { font-family: 'Cormorant Garamond', serif; }
    .luxury-card { background: white; border: 1px solid rgba(26,26,26,0.05); padding: 1.5rem; }
    .luxury-input { background: transparent; border-bottom: 1px solid rgba(26,26,26,0.2); padding: 0.5rem 0; width: 100%; outline: none; transition: border-color 0.3s; }
    .luxury-input:focus { border-color: #1a1a1a; }
    .luxury-button { background: #1a1a1a; color: #f5f2ed; padding: 0.75rem 2rem; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem; font-weight: 600; transition: opacity 0.3s; }
    .luxury-button:hover { opacity: 0.9; }
    .loader { border-top-color: #1a1a1a; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen p-8 lg:p-16">
    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-luxury-cream z-50">
      <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mb-4"></div>
      <p class="serif italic">Refining the experience...</p>
    </div>

    <header class="flex justify-between items-end mb-16">
      <div>
        <h1 class="serif text-6xl mb-2">Luxe Resort</h1>
        <p class="serif italic text-gray-500">Management Dashboard</p>
      </div>
      <button onclick="toggleView('booking')" class="luxury-button">New Booking</button>
    </header>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="space-y-16">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="luxury-card">
          <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">Daily Revenue</p>
          <p id="daily-rev" class="serif text-4xl">฿0</p>
        </div>
        <div class="luxury-card">
          <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">Monthly Revenue</p>
          <p id="monthly-rev" class="serif text-4xl">฿0</p>
        </div>
        <div class="luxury-card">
          <p class="text-xs uppercase tracking-widest text-gray-400 mb-2">Yearly Revenue</p>
          <p id="yearly-rev" class="serif text-4xl">฿0</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
        <div class="luxury-card">
          <h3 class="serif text-2xl mb-8">Recent Bookings</h3>
          <div id="bookings-list" class="space-y-4"></div>
        </div>
        <div class="luxury-card">
          <h3 class="serif text-2xl mb-8">Active Promotions</h3>
          <div id="promos-list" class="grid grid-cols-1 gap-4"></div>
        </div>
      </div>
    </div>

    <!-- Booking View -->
    <div id="booking-view" class="hidden max-w-2xl mx-auto">
      <div class="luxury-card p-12">
        <h2 class="serif text-4xl mb-8">On-site Booking</h2>
        <form id="booking-form" onsubmit="submitBooking(event)" class="space-y-8">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <label class="text-xs uppercase tracking-widest text-gray-400">Guest Name</label>
              <input type="text" name="guestName" required class="luxury-input">
            </div>
            <div>
              <label class="text-xs uppercase tracking-widest text-gray-400">Phone</label>
              <input type="tel" name="phone" required class="luxury-input">
            </div>
          </div>
          <div>
            <label class="text-xs uppercase tracking-widest text-gray-400">Room Type</label>
            <select name="roomType" required class="luxury-input">
              <option value="">Select Room...</option>
              <option value="Deluxe Suite">Deluxe Suite</option>
              <option value="Standard Room">Standard Room</option>
              <option value="Villa">Villa</option>
            </select>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <label class="text-xs uppercase tracking-widest text-gray-400">Check-in</label>
              <input type="date" name="checkIn" required class="luxury-input">
            </div>
            <div>
              <label class="text-xs uppercase tracking-widest text-gray-400">Check-out</label>
              <input type="date" name="checkOut" required class="luxury-input">
            </div>
          </div>
          <div>
            <label class="text-xs uppercase tracking-widest text-gray-400">Amount (฿)</label>
            <input type="number" name="amount" required class="luxury-input">
          </div>
          <div class="flex gap-4 pt-4">
            <button type="button" onclick="toggleView('dashboard')" class="luxury-button bg-gray-200 text-gray-800">Cancel</button>
            <button type="submit" class="luxury-button flex-1">Confirm Booking</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function toggleView(view) {
      document.getElementById('dashboard-view').classList.toggle('hidden', view !== 'dashboard');
      document.getElementById('booking-view').classList.toggle('hidden', view !== 'booking');
    }

    function loadData() {
      document.getElementById('loading').style.display = 'flex';
      google.script.run
        .withSuccessHandler(renderData)
        .withFailureHandler(err => alert('Error: ' + err))
        .getData();
    }

    function renderData(data) {
      document.getElementById('loading').style.display = 'none';
      
      const bookings = data.bookings.slice(1);
      const promos = data.promos.slice(1);
      
      // Calculate Revenues
      const now = new Date();
      const todayStr = now.toISOString().split('T')[0];
      const monthStr = todayStr.substring(0, 7);
      const yearStr = todayStr.substring(0, 4);
      
      let daily = 0, monthly = 0, yearly = 0;
      
      bookings.forEach(b => {
        const amount = parseFloat(b[7]) || 0;
        const checkIn = b[5];
        if (checkIn === todayStr) daily += amount;
        if (checkIn.startsWith(monthStr)) monthly += amount;
        if (checkIn.startsWith(yearStr)) yearly += amount;
      });
      
      document.getElementById('daily-rev').innerText = '฿' + daily.toLocaleString();
      document.getElementById('monthly-rev').innerText = '฿' + monthly.toLocaleString();
      document.getElementById('yearly-rev').innerText = '฿' + yearly.toLocaleString();
      
      // Render Bookings
      const bookingsHtml = bookings.slice(0, 5).map(b => `
        <div class="flex justify-between items-center py-3 border-b border-gray-100 last:border-0">
          <div>
            <p class="serif text-lg">${b[2]}</p>
            <p class="text-[10px] uppercase tracking-widest text-gray-400">${b[4]} • ${b[5]}</p>
          </div>
          <p class="font-medium">฿${(parseFloat(b[7]) || 0).toLocaleString()}</p>
        </div>
      `).join('');
      document.getElementById('bookings-list').innerHTML = bookingsHtml || '<p class="text-gray-400 italic">No recent bookings</p>';
      
      // Render Promos
      const promosHtml = promos.map(p => `
        <div class="p-4 border border-gray-100">
          <div class="flex justify-between items-start mb-2">
            <h4 class="serif text-xl">${p[0]}</h4>
            <span class="text-[8px] uppercase tracking-widest px-2 py-1 bg-gray-100">${p[4]}</span>
          </div>
          <p class="serif text-2xl text-yellow-600">${p[1]} OFF</p>
        </div>
      `).join('');
      document.getElementById('promos-list').innerHTML = promosHtml || '<p class="text-gray-400 italic">No active promotions</p>';
    }

    function submitBooking(e) {
      e.preventDefault();
      const form = e.target;
      const formData = {
        guestName: form.guestName.value,
        phone: form.phone.value,
        roomType: form.roomType.value,
        checkIn: form.checkIn.value,
        checkOut: form.checkOut.value,
        amount: form.amount.value
      };
      
      document.getElementById('loading').style.display = 'flex';
      google.script.run
        .withSuccessHandler(() => {
          form.reset();
          loadData();
          toggleView('dashboard');
        })
        .withFailureHandler(err => {
          alert('Error: ' + err);
          document.getElementById('loading').style.display = 'none';
        })
        .addBooking(formData);
    }

    // Initial Load
    window.onload = loadData;
  </script>
</body>
</html>
